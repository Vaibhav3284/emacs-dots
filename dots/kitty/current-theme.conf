font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size        11.0

cursor                  #b82030
cursor_text_color       #050305
cursor_shape            block
cursor_blink_interval   0.5
cursor_stop_blinking_after 10.0

scrollback_lines 10000
mouse_hide_wait 2.0

window_padding_width    10
draw_minimal_borders    no
window_border_width     1px
active_border_color     #b82030
inactive_border_color   #1e0f10
bell_border_color       #a05018

tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      " {title} "
active_tab_foreground   #e0a890
active_tab_background   #5a1018
inactive_tab_foreground #503030
inactive_tab_background #0d0608
tab_bar_background      #050305

# ── Color Palette ────────────────────────────────────────────────

background              #050305
foreground              #c0907a

selection_background    #3a1010
selection_foreground    #e0a890

# Black
color0  #0d080a
color8  #281818

# Red (deep blood red, not pink)
color1  #902030
color9  #b82030

# Green (dark olive-teal)
color2  #284030
color10 #3a5a38

# Yellow (burnt amber-orange)
color3  #904818
color11 #b86020

# Blue (very dark slate)
color4  #182030
color12 #283848

# Magenta (deep burgundy, no pink)
color5  #581828
color13 #782030

# Cyan (dark muted teal)
color6  #1a3035
color14 #284848

# White (warm off-white, orange-tinted not pink)
color7  #806050
color15 #c0907a

url_color               #b86020
url_style               curly

enable_audio_bell       no
visual_bell_duration    0.1
visual_bell_color       #902030
